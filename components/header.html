<style>
    /* ================= HEADER ================= */
    
    .header {
        height: 80px;
        display: flex;
        padding: 5px 20px;
        align-items: center;
        background: #0b2c4d;
        justify-content: space-between;
        gap: 15px;
        flex-wrap: nowrap;
        min-width: 0;
        width: 100%;
        border-bottom: 2px solid rgba(0, 176, 255, 0.2);
    }
    
    /* LOGO STYLES - Fixed Left */
    .logo {
        flex-shrink: 0;
        display: flex;
        align-items: center;
    }
    
    .logo a {
        display: flex;
        align-items: center;
        text-decoration: none;
    }
    
    .logo img {
        max-height: 55px;
        width: auto;
        display: block;
        object-fit: contain;
    }
    
    /* TITLE STYLES - Centered Between Logo and Button */
    .title {
        flex: 1;
        text-align: center;
        min-width: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        padding: 0 10px;
    }
    
    .title h1 {
        margin: 0;
        font-weight: 700;
        letter-spacing: 0.3px;
        color: white;
        text-align: center;
        line-height: 1.2;
        transition: font-size 0.2s ease;
        max-width: 100%;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 0 4px;
        font-size: clamp(16px, 2vw, 24px);
    }
    
    .title h1 .journal-name {
        display: inline;
        white-space: nowrap;
    }
    
    .title h1 .abbr {
        color: #00b0ff;
        display: inline;
        white-space: nowrap;
    }
    
    /* SUBMIT BUTTON - Fixed Right */
    .submit-btn {
        flex-shrink: 0;
        display: flex;
        align-items: center;
    }
    
    .submit-btn a {
        background: #00b0ff;
        color: #061d33;
        padding: 10px 18px;
        border-radius: 6px;
        font-weight: bold;
        text-decoration: none;
        box-shadow: 0 0 15px rgba(0, 176, 255, 0.3);
        white-space: nowrap;
        display: inline-block;
        font-size: clamp(11px, 1vw, 16px);
        transition: background 0.3s ease;
    }
    
    .submit-btn a:hover {
        background: #40c4ff;
    }
    
    /* ===== RESPONSIVE HEADER ===== */
    
    /* Medium (768-991px) - Title wraps */
    @media (max-width: 991px) and (min-width: 768px) {
        .header {
            padding: 5px 12px;
            gap: 10px;
            height: auto;
            min-height: 70px;
        }
        
        .logo img {
            max-height: 45px;
        }
        
        .title h1 {
            font-size: 16px;
            white-space: normal;
            word-wrap: break-word;
            line-height: 1.2;
            justify-content: center;
        }
        
        .title h1 .journal-name {
            white-space: normal;
        }
        
        .submit-btn a {
            padding: 8px 14px;
            font-size: 13px;
        }
    }
    
    /* Tablet/Small (576-767px) */
    @media (max-width: 767px) and (min-width: 576px) {
        .header {
            flex-wrap: wrap;
            height: auto;
            min-height: 65px;
            padding: 8px 12px;
            gap: 6px;
            justify-content: center;
        }
        
        .logo {
            flex: 0 0 100%;
            text-align: center;
            justify-content: center;
        }
        
        .logo img {
            max-height: 38px;
        }
        
        .title {
            flex: 1 1 55%;
            text-align: center;
            padding: 0 5px;
        }
        
        .title h1 {
            font-size: 14px;
            white-space: normal;
            word-wrap: break-word;
            line-height: 1.2;
            justify-content: center;
        }
        
        .title h1 .journal-name {
            white-space: normal;
        }
        
        .submit-btn {
            flex: 0 1 auto;
        }
        
        .submit-btn a {
            padding: 6px 12px;
            font-size: 12px;
        }
    }
    
    /* Mobile (400-575px) */
    @media (max-width: 575px) and (min-width: 400px) {
        .header {
            flex-wrap: wrap;
            height: auto;
            min-height: 60px;
            padding: 6px 10px;
            gap: 4px;
            justify-content: center;
        }
        
        .logo {
            flex: 0 0 100%;
            text-align: center;
            justify-content: center;
        }
        
        .logo img {
            max-height: 32px;
        }
        
        .title {
            flex: 1 1 50%;
            text-align: center;
            padding: 0 3px;
        }
        
        .title h1 {
            font-size: 12px;
            white-space: normal;
            line-height: 1.2;
            justify-content: center;
        }
        
        .title h1 .journal-name {
            white-space: normal;
        }
        
        .submit-btn a {
            padding: 5px 10px;
            font-size: 11px;
        }
    }
    
    /* Very Small Mobile (<400px) - Show abbreviation only */
    @media (max-width: 399px) {
        .header {
            flex-wrap: wrap;
            height: auto;
            min-height: 55px;
            padding: 4px 6px;
            gap: 3px;
            justify-content: center;
        }
        
        .logo {
            flex: 0 0 100%;
            text-align: center;
            justify-content: center;
        }
        
        .logo img {
            max-height: 28px;
        }
        
        .title {
            flex: 1 1 45%;
            text-align: center;
            padding: 0 2px;
        }
        
        /* Hide full title, show only abbreviation */
        .title h1 .journal-name {
            display: none;
        }
        
        .title h1 .abbr {
            display: inline;
            font-size: 14px;
            color: white;
        }
        
        .title h1 .abbr span {
            color: #00b0ff;
        }
        
        .title h1 {
            font-size: 14px;
            white-space: nowrap;
        }
        
        .submit-btn a {
            padding: 4px 8px;
            font-size: 9px;
        }
    }
</style>

<header class="header">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- LOGO - Fixed Left -->
    <div class="logo">
        <a href="index.html">
            <img 
                src="assets/editors/logo.png" 
                alt="IJACM Logo"
                onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=\"color:#00b0ff;font-size:24px;font-weight:700;\">IJACM</span>';"
            >
        </a> 
    </div>

    <!-- TITLE - Centered Between -->
    <div class="title">
        <h1>
            <span class="journal-name">International Journal of Advanced Computing and Mechanical Systems </span>
            <span class="abbr">(<span>IJACM</span>)</span>
        </h1>
    </div>

    <!-- SUBMIT BUTTON - Fixed Right -->
    <div class="submit-btn">
        <a href="pages/submit.html">
            Submit Paper
        </a>
    </div>
</header>
