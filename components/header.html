<style>
    /* ================= HEADER ================= */
    
    .header {
        height: 80px;
        display: flex;
        padding: 5px 20px;
        align-items: center;
        background: var(--bg-dark);
        justify-content: space-between;
        gap: 15px;
        flex-wrap: nowrap;
    }
    
    /* LOGO STYLES */
    .logo {
        flex-shrink: 0;
        display: flex;
        align-items: center;
    }
    
    .logo a {
        display: flex;
        align-items: center;
        text-decoration: none;
    }
    
    .logo img {
        max-height: 60px;
        width: auto;
        display: block;
        object-fit: contain;
    }
    
    /* TITLE STYLES - Auto-aligns based on screen size */
    .title {
        flex: 1;
        text-align: center;
        min-width: 0;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    .title h1 {
        margin: 0;
        font-size: clamp(16px, 2.2vw, 24px);
        font-weight: 700;
        letter-spacing: 0.5px;
        color: white;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
        transition: font-size 0.3s ease;
    }
    
    .title h1 .journal-name {
        display: inline;
    }
    
    .title h1 .abbr {
        color: var(--secondary);
        display: inline;
    }
    
    /* SUBMIT BUTTON IN HEADER */
    .submit-btn {
        flex-shrink: 0;
    }
    
    .submit-btn a {
        background: var(--secondary);
        color: var(--bg-darker);
        padding: 10px 18px;
        border-radius: 6px;
        font-weight: bold;
        text-decoration: none;
        box-shadow: var(--shadow-glow);
        white-space: nowrap;
        display: inline-block;
        font-size: clamp(12px, 1vw, 16px);
        transition: background 0.3s ease;
    }
    
    .submit-btn a:hover {
        background: #40c4ff;
    }
    
    /* ================= RESPONSIVE HEADER ================= */
    
    /* Large screens - Full title visible */
    @media (min-width: 1200px) {
        .title h1 {
            font-size: 24px;
            white-space: nowrap;
        }
    }
    
    /* Medium screens - Title shrinks but stays on one line */
    @media (max-width: 1199px) and (min-width: 993px) {
        .title h1 {
            font-size: 18px;
            white-space: nowrap;
        }
    }
    
    /* Tablets - Title wraps and shows abbreviation */
    @media (max-width: 992px) and (min-width: 769px) {
        .header {
            padding: 5px 15px;
            gap: 10px;
        }
        
        .logo img {
            max-height: 50px;
        }
        
        .title h1 {
            font-size: clamp(13px, 1.8vw, 16px);
            white-space: normal;
            word-wrap: break-word;
            line-height: 1.3;
            text-align: center;
        }
    }
    
    /* Mobile - Title wraps and auto-aligns */
    @media (max-width: 768px) {
        .header {
            flex-wrap: wrap;
            height: auto;
            min-height: 70px;
            padding: 10px 15px;
            gap: 8px;
            justify-content: center;
        }
        
        .logo {
            flex: 0 0 100%;
            text-align: center;
            justify-content: center;
            margin-bottom: 2px;
        }
        
        .logo img {
            max-height: 40px;
        }
        
        .title {
            flex: 1 1 60%;
            text-align: center;
            justify-content: center;
        }
        
        .title h1 {
            font-size: clamp(11px, 2.5vw, 15px);
            white-space: normal;
            word-wrap: break-word;
            line-height: 1.3;
            text-align: center;
            display: block;
        }
    }
    
    /* Very small phones - Show only abbreviation */
    @media (max-width: 480px) {
        .header {
            padding: 6px 8px;
            gap: 4px;
        }
        
        .logo img {
            max-height: 32px;
        }
        
        .title h1 {
            font-size: clamp(9px, 2.2vw, 12px);
            line-height: 1.2;
        }
        
        .submit-btn a {
            padding: 5px 8px;
            font-size: clamp(8px, 1.8vw, 10px);
        }
    }
    
    /* Extra small screens - Hide long name, show only abbreviation */
    @media (max-width: 360px) {
        .title h1 .journal-name {
            display: none;
        }
        
        .title h1 .abbr {
            display: inline;
            font-size: clamp(12px, 3vw, 16px);
            color: white;
        }
        
        .title h1 .abbr span {
            color: var(--secondary);
        }
        
        .title h1 {
            white-space: nowrap;
        }
    }
</style>

<header class="header">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <div class="logo">
        <a href="index.html">
            <img src="assets/editors/logo.png" alt="Scholar Sphere Publications Logo">
        </a> 
    </div>

    <div class="title">
        <h1>
            <span class="journal-name">International Journal of Advanced Computing and Mechanical Systems </span>
            <span class="abbr">(<span>IJACM</span>)</span>
        </h1>
    </div>

    <div class="submit-btn">
        <a href="pages/submit.html">
            Submit Paper
        </a>
    </div>
</header>
