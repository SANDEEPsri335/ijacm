<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IJACM - Navbar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0b2c4d;
            min-height: 100vh;
        }

        .navbar {
            background: linear-gradient(180deg, #0b2b4a, #061d33);
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1000;
            padding: 0 30px;
            width: 100%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav-container {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            flex-wrap: nowrap;
            max-width: 1200px;
            width: 100%;
        }

        .nav-container a {
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            padding: 8px 16px;
            text-decoration: none;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .nav-home {
            font-size: 17px;
            color: #00b0ff;
        }

        .nav-home i {
            font-size: 15px;
            margin-right: 4px;
        }

        .nav-container a:hover {
            color: #00c6ff;
        }

        /* ===== DROPDOWN ===== */
        .dropdown-wrapper {
            position: relative;
            display: inline-block;
        }

        .dropdown-btn {
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            padding: 8px 16px;
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .dropdown-btn:hover {
            color: #00c6ff;
        }

        .arrow {
            font-size: 10px;
            transition: transform 0.3s ease;
            color: #78909c;
            display: inline-block;
        }

        .dropdown-wrapper.active .arrow {
            transform: rotate(180deg);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            min-width: 220px;
            background: #0b2b4a;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            z-index: 9999;
            margin-top: 8px;
            border: 1px solid rgba(255,255,255,0.08);
            display: none;
            flex-direction: column;
            gap: 5px;
        }

        .dropdown-wrapper.active .dropdown-menu {
            display: flex;
        }

        .dropdown-menu a {
            background: #103a63;
            color: #ffffff;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 400;
            border-radius: 8px;
            white-space: nowrap;
            display: block;
            transition: all 0.2s ease;
            text-align: left;
        }

        .dropdown-menu a:hover {
            background: #145a8d;
            transform: translateX(4px);
            color: #ffffff;
        }

        /* MENU TOGGLE */
        .menu-toggle {
            display: none;
            font-size: 24px;
            color: #fff;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px 15px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1200px) {
            .nav-container a, .dropdown-btn {
                font-size: 14px;
                padding: 8px 12px;
            }
            .nav-home { font-size: 15px; }
        }

        @media (max-width: 1050px) {
            .nav-container a, .dropdown-btn {
                font-size: 13px;
                padding: 8px 10px;
            }
            .nav-home { font-size: 14px; }
            .nav-container a[href*="indexing"] {
                display: none;
            }
        }

        @media (max-width: 950px) {
            .nav-container a, .dropdown-btn {
                font-size: 12px;
                padding: 8px 8px;
            }
            .nav-home { font-size: 13px; }
            .nav-home span { display: none; }
            .nav-container a[href*="publication-fee"] {
                display: none;
            }
        }

        /* MOBILE */
        @media (max-width: 850px) {
            .navbar {
                height: 50px;
                padding: 0 15px;
                justify-content: space-between;
            }

            .menu-toggle {
                display: block;
            }

            .nav-container {
                position: absolute;
                top: 50px;
                left: 0;
                width: 100%;
                background: #061d33;
                flex-direction: column;
                gap: 0;
                padding: 0;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.35s ease-out;
                align-items: flex-start;
                z-index: 1000;
                box-shadow: 0 15px 30px rgba(0,0,0,0.4);
                border-top: 1px solid rgba(255,255,255,0.05);
            }

            .nav-container.active {
                max-height: 100vh;
                overflow-y: auto;
                padding-bottom: 15px;
            }

            .nav-container a,
            .dropdown-wrapper,
            .dropdown-btn {
                display: block;
                width: 100%;
                font-size: 16px !important;
                padding: 14px 25px !important;
                border-bottom: 1px solid rgba(255, 255, 255, 0.04);
                white-space: normal;
                text-align: left;
                color: #e0e6ed;
            }

            .nav-container a:hover,
            .dropdown-btn:hover {
                background: rgba(0, 176, 255, 0.08);
            }

            .nav-home {
                font-size: 17px !important;
                color: #00b0ff;
            }

            .nav-home span {
                display: inline !important;
            }

            .dropdown-wrapper {
                position: static;
                padding: 0 !important;
            }

            .dropdown-btn {
                display: flex !important;
                justify-content: space-between;
                align-items: center;
                width: 100%;
                padding: 14px 25px !important;
                font-size: 16px !important;
                border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            }

            .dropdown-btn .arrow {
                font-size: 14px;
            }

            .dropdown-menu {
                position: static;
                width: 100%;
                box-shadow: none;
                background: #041424;
                border-radius: 0;
                padding: 0;
                margin-top: 0;
                border: none;
                transform: none;
                min-width: auto;
                display: none !important;
            }

            .dropdown-wrapper.active .dropdown-menu {
                display: flex !important;
            }

            .dropdown-menu a {
                background: transparent;
                padding: 12px 25px 12px 40px !important;
                border-bottom: 1px solid rgba(255, 255, 255, 0.03);
                border-radius: 0;
                transform: none;
                font-size: 15px !important;
                color: #b0bec5;
            }

            .dropdown-menu a:hover {
                background: rgba(0, 176, 255, 0.1);
                transform: none;
                color: #ffffff;
            }
        }

        @media (max-width: 500px) {
            .navbar {
                height: 46px;
                padding: 0 10px;
            }
            
            .nav-container {
                top: 46px;
            }
            
            .nav-container a,
            .dropdown-btn {
                font-size: 15px !important;
                padding: 12px 20px !important;
            }
            
            .nav-home {
                font-size: 16px !important;
            }
            
            .dropdown-menu a {
                font-size: 14px !important;
                padding: 10px 20px 10px 35px !important;
            }
        }

        @media (min-width: 1400px) {
            .nav-container a, .dropdown-btn {
                font-size: 18px;
                padding: 8px 20px;
            }
            .nav-home { font-size: 20px; }
            .nav-container { gap: 12px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <button class="menu-toggle" id="menuToggle">
            <i class="fas fa-bars"></i>
        </button>

        <div class="nav-container" id="navMenu">
            <a href="index.html" class="nav-home">
                <i class="fas fa-home"></i> <span>Home</span>
            </a>

            <a href="pages/about.html">About</a>
            <a href="pages/aims-scope.html">Aims &amp; Scope</a>
            <a href="pages/editorial-board.html">Editorial Board</a>
            <a href="pages/indexing.html">Indexing</a>

            <!-- GUIDELINES DROPDOWN -->
            <div class="dropdown-wrapper" id="guidelinesWrapper">
                <button class="dropdown-btn" id="guidelinesBtn">
                    Guidelines
                    <span class="arrow">▼</span>
                </button>
                <div class="dropdown-menu">
                    <a href="pages/author-guidelines.html">Author Guidelines</a>
                    <a href="pages/peer-review.html">Peer Review Policy</a>
                    <a href="pages/reviewer-guidelines.html">Reviewer Guidelines</a>
                    <a href="pages/publication-ethics.html">Publication Ethics</a>
                    <a href="pages/plagiarism-policy.html">Plagiarism Policy</a>
                    <a href="pages/open-access-policy.html">Open Access Policy</a>
                    <a href="pages/copyright.html">Copyright &amp; Licensing</a>
                </div>
            </div>

            <!-- ARTICLES DROPDOWN -->
            <div class="dropdown-wrapper" id="articlesWrapper">
                <button class="dropdown-btn" id="articlesBtn">
                    Articles
                    <span class="arrow">▼</span>
                </button>
                <div class="dropdown-menu">
                    <a href="pages/current-issue.html">Current Issue</a>
                    <a href="pages/cover-page.html">Cover Page</a>
                    <a href="pages/previous-volume.html">Previous Volumes</a>
                </div>
            </div>

            <a href="pages/publication-fee.html">Fee</a>
            <a href="pages/contact.html">Contact</a>
        </div>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Get elements
            var guidelinesBtn = document.getElementById('guidelinesBtn');
            var guidelinesWrapper = document.getElementById('guidelinesWrapper');
            var articlesBtn = document.getElementById('articlesBtn');
            var articlesWrapper = document.getElementById('articlesWrapper');
            var menuToggle = document.getElementById('menuToggle');
            var navMenu = document.getElementById('navMenu');

            // Function to close all dropdowns
            function closeAllDropdowns() {
                guidelinesWrapper.classList.remove('active');
                articlesWrapper.classList.remove('active');
            }

            // Function to toggle a dropdown
            function toggleDropdown(wrapper) {
                // If this dropdown is already open, close it
                if (wrapper.classList.contains('active')) {
                    wrapper.classList.remove('active');
                } else {
                    // Close all others first
                    closeAllDropdowns();
                    // Open this one
                    wrapper.classList.add('active');
                }
            }

            // ===== GUIDELINES DROPDOWN =====
            guidelinesBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                toggleDropdown(guidelinesWrapper);
            });

            // ===== ARTICLES DROPDOWN =====
            articlesBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                toggleDropdown(articlesWrapper);
            });

            // ===== DESKTOP HOVER =====
            // Guidelines hover
            guidelinesWrapper.addEventListener('mouseenter', function() {
                if (window.innerWidth > 850) {
                    closeAllDropdowns();
                    guidelinesWrapper.classList.add('active');
                }
            });

            guidelinesWrapper.addEventListener('mouseleave', function() {
                if (window.innerWidth > 850) {
                    setTimeout(function() {
                        if (!guidelinesWrapper.matches(':hover')) {
                            guidelinesWrapper.classList.remove('active');
                        }
                    }, 200);
                }
            });

            // Articles hover
            articlesWrapper.addEventListener('mouseenter', function() {
                if (window.innerWidth > 850) {
                    closeAllDropdowns();
                    articlesWrapper.classList.add('active');
                }
            });

            articlesWrapper.addEventListener('mouseleave', function() {
                if (window.innerWidth > 850) {
                    setTimeout(function() {
                        if (!articlesWrapper.matches(':hover')) {
                            articlesWrapper.classList.remove('active');
                        }
                    }, 200);
                }
            });

            // ===== MOBILE MENU TOGGLE =====
            if (menuToggle) {
                menuToggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    navMenu.classList.toggle('active');
                    
                    if (!navMenu.classList.contains('active')) {
                        closeAllDropdowns();
                    }
                });
            }

            // ===== CLOSE DROPDOWNS WHEN CLICKING LINKS =====
            var allLinks = document.querySelectorAll('.dropdown-menu a, .nav-container > a');
            allLinks.forEach(function(link) {
                link.addEventListener('click', function() {
                    closeAllDropdowns();
                    if (window.innerWidth <= 850) {
                        navMenu.classList.remove('active');
                    }
                });
            });

            // ===== CLOSE DROPDOWNS WHEN CLICKING OUTSIDE =====
            document.addEventListener('click', function(e) {
                var isInsideNav = e.target.closest('.nav-container');
                var isToggle = e.target.closest('.menu-toggle');
                
                if (!isInsideNav && !isToggle) {
                    closeAllDropdowns();
                    if (window.innerWidth <= 850 && navMenu.classList.contains('active')) {
                        navMenu.classList.remove('active');
                    }
                }
            });

            // ===== PREVENT CLOSING WHEN CLICKING INSIDE DROPDOWN MENU =====
            var dropdownMenus = document.querySelectorAll('.dropdown-menu');
            dropdownMenus.forEach(function(menu) {
                menu.addEventListener('click', function(e) {
                    e.stopPropagation();
                });
            });

            // ===== HANDLE WINDOW RESIZE =====
            var resizeTimer;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function() {
                    if (window.innerWidth > 850 && navMenu.classList.contains('active')) {
                        navMenu.classList.remove('active');
                    }
                    if (window.innerWidth > 850) {
                        closeAllDropdowns();
                    }
                }, 300);
            });
        });
    </script>
</body>
</html>
