<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IJACM - Navbar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ================= OPTIMIZED NAVBAR ================= */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0b2c4d;
            min-height: 100vh;
        }

        .navbar {
            background: linear-gradient(180deg, #0b2b4a, #061d33);
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1000;
            padding: 0 30px;
            width: 100%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav-container {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            min-width: 0;
            flex-wrap: nowrap;
            max-width: 1200px;
            width: 100%;
        }

        .nav-container a, 
        details.dropdown > summary {
            color: #ffffff;
            font-size: clamp(14px, 1.3vw, 18px);
            font-weight: 500;
            padding: 8px clamp(8px, 1vw, 18px);
            text-decoration: none;
            transition: all 0.3s ease;
            white-space: nowrap;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            list-style: none;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }

        details.dropdown > summary::-webkit-details-marker {
            display: none;
        }

        .nav-home {
            font-size: clamp(15px, 1.4vw, 20px);
            gap: 6px;
            color: #00b0ff;
        }

        .nav-home i {
            font-size: clamp(14px, 1.1vw, 18px);
        }

        .nav-container a:hover,
        details.dropdown > summary:hover {
            color: #00c6ff;
        }

        /* DROPDOWN STYLES */
        details.dropdown {
            position: relative;
            display: inline-block;
        }

        details.dropdown > summary {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .arrow {
            font-size: 11px;
            transition: transform 0.3s ease;
            margin-left: 3px;
            color: #78909c;
        }

        details.dropdown[open] > summary .arrow {
            transform: rotate(180deg);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            min-width: 220px;
            background: #0b2b4a;
            padding: 10px;
            border-radius: 12px;
            display: none;
            flex-direction: column;
            gap: 5px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            z-index: 9999;
            margin-top: 8px;
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
        }

        details.dropdown[open] .dropdown-menu {
            display: flex;
        }

        .dropdown-menu a {
            background: #103a63;
            color: #ffffff;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 400;
            border-radius: 8px;
            white-space: nowrap;
            display: block;
            transition: all 0.2s ease;
            border: none;
            text-align: left;
        }

        .dropdown-menu a:hover {
            background: #145a8d;
            transform: translateX(4px);
            color: #ffffff;
        }

        .menu-toggle {
            display: none;
            font-size: 24px;
            color: #fff;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px 15px;
        }

        /* ===== RESPONSIVE ===== */
        
        @media (max-width: 1200px) {
            .nav-container a, details.dropdown > summary {
                font-size: clamp(13px, 1.1vw, 16px);
                padding: 8px clamp(6px, 0.8vw, 14px);
            }
            .nav-home { font-size: clamp(14px, 1.2vw, 18px); }
            .nav-container { gap: 4px; }
        }

        @media (max-width: 1050px) {
            .nav-container a, details.dropdown > summary {
                font-size: clamp(12px, 1vw, 14px);
                padding: 8px clamp(5px, 0.6vw, 10px);
            }
            .nav-home { font-size: clamp(13px, 1.1vw, 16px); }
            .nav-container { gap: 2px; }
            .nav-container a[href*="indexing"] {
                display: none;
            }
        }

        @media (max-width: 950px) {
            .nav-container a, details.dropdown > summary {
                font-size: clamp(11px, 0.9vw, 13px);
                padding: 8px clamp(4px, 0.5vw, 8px);
            }
            .nav-home { font-size: clamp(12px, 1vw, 15px); }
            .nav-home span { display: none; }
            .nav-container a[href*="publication-fee"] {
                display: none;
            }
        }

        @media (max-width: 850px) {
            .navbar {
                height: 50px;
                padding: 0 15px;
                justify-content: space-between;
            }

            .menu-toggle {
                display: block;
            }

            .nav-container {
                position: absolute;
                top: 50px;
                left: 0;
                width: 100%;
                background: #061d33;
                flex-direction: column;
                gap: 0;
                padding: 0;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.35s ease-out;
                align-items: flex-start;
                z-index: 1000;
                box-shadow: 0 15px 30px rgba(0,0,0,0.4);
                border-top: 1px solid rgba(255,255,255,0.05);
                max-width: 100%;
            }

            .nav-container.active {
                max-height: 100vh;
                overflow-y: auto;
                padding-bottom: 15px;
            }

            .nav-container a, 
            details.dropdown,
            details.dropdown > summary,
            .nav-container a[href*="indexing"],
            .nav-container a[href*="publication-fee"] {
                display: block;
                width: 100%;
                font-size: 16px !important;
                padding: 14px 25px !important;
                border-bottom: 1px solid rgba(255, 255, 255, 0.04);
                white-space: normal;
                text-align: left;
                color: #e0e6ed;
                flex-shrink: 1;
            }

            .nav-container a:hover,
            details.dropdown > summary:hover {
                background: rgba(0, 176, 255, 0.08);
            }

            .nav-home {
                font-size: 17px !important;
                color: #00b0ff;
            }

            .nav-home span {
                display: inline !important;
            }

            details.dropdown {
                position: static;
            }

            details.dropdown > summary {
                display: flex !important;
                justify-content: space-between;
                align-items: center;
                width: 100%;
                padding: 14px 25px !important;
                font-size: 16px !important;
            }

            details.dropdown > summary .arrow {
                font-size: 14px;
            }

            .dropdown-menu {
                position: static;
                width: 100%;
                box-shadow: none;
                background: #041424;
                border-radius: 0;
                padding: 0;
                margin-top: 0;
                display: none !important;
                border: none;
                transform: none;
                min-width: auto;
                backdrop-filter: none;
            }

            details.dropdown[open] .dropdown-menu {
                display: flex !important;
            }

            .dropdown-menu a {
                background: transparent;
                padding: 12px 25px 12px 40px !important;
                border-bottom: 1px solid rgba(255, 255, 255, 0.03);
                border-radius: 0;
                transform: none;
                font-size: 15px !important;
                color: #b0bec5;
            }

            .dropdown-menu a:hover {
                background: rgba(0, 176, 255, 0.1);
                transform: none;
                color: #ffffff;
            }
        }

        @media (max-width: 500px) {
            .navbar {
                height: 46px;
                padding: 0 10px;
            }
            
            .nav-container {
                top: 46px;
            }
            
            .nav-container a, 
            details.dropdown > summary {
                font-size: 15px !important;
                padding: 12px 20px !important;
            }
            
            .nav-home {
                font-size: 16px !important;
            }
            
            .dropdown-menu a {
                font-size: 14px !important;
                padding: 10px 20px 10px 35px !important;
            }
        }

        @media (min-width: 1400px) {
            .nav-container a, details.dropdown > summary {
                font-size: 18px;
                padding: 8px 20px;
            }
            .nav-home { font-size: 20px; }
            .nav-container { gap: 12px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <button class="menu-toggle" aria-label="Toggle menu">
            <i class="fas fa-bars"></i>
        </button>

        <div class="nav-container" id="nav-menu">
            <a href="index.html" class="nav-home">
                <i class="fas fa-home"></i> <span>Home</span>
            </a>

            <a href="pages/about.html">About</a>
            <a href="pages/aims-scope.html">Aims &amp; Scope</a>
            <a href="pages/editorial-board.html">Editorial Board</a>
            <a href="pages/indexing.html">Indexing</a>

            <!-- GUIDELINES DROPDOWN -->
            <details class="dropdown" id="guidelines-dropdown">
                <summary class="dropbtn">
                    Guidelines
                    <span class="arrow">▼</span>
                </summary>
                <div class="dropdown-menu">
                    <a href="pages/author-guidelines.html">Author Guidelines</a>
                    <a href="pages/peer-review.html">Peer Review Policy</a>
                    <a href="pages/reviewer-guidelines.html">Reviewer Guidelines</a>
                    <a href="pages/publication-ethics.html">Publication Ethics</a>
                    <a href="pages/plagiarism-policy.html">Plagiarism Policy</a>
                    <a href="pages/open-access-policy.html">Open Access Policy</a>
                    <a href="pages/copyright.html">Copyright &amp; Licensing</a>
                </div>
            </details>

            <!-- ARTICLES DROPDOWN -->
            <details class="dropdown" id="articles-dropdown">
                <summary class="dropbtn">
                    Articles
                    <span class="arrow">▼</span>
                </summary>
                <div class="dropdown-menu">
                    <a href="pages/current-issue.html">Current Issue</a>
                    <a href="pages/cover-page.html">Cover Page</a>
                    <a href="pages/previous-volume.html">Previous Volumes</a>
                </div>
            </details>

            <a href="pages/publication-fee.html">Fee</a>
            <a href="pages/contact.html">Contact</a>
        </div>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var menuToggle = document.querySelector('.menu-toggle');
            var navMenu = document.getElementById('nav-menu');
            var dropdowns = document.querySelectorAll('details.dropdown');
            
            function isMobile() {
                return window.innerWidth <= 850;
            }

            function closeAllDropdowns() {
                dropdowns.forEach(function(drop) {
                    drop.removeAttribute('open');
                });
            }

            // ===== MOBILE MENU TOGGLE =====
            if (menuToggle) {
                menuToggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    navMenu.classList.toggle('active');
                    
                    if (!navMenu.classList.contains('active')) {
                        closeAllDropdowns();
                    }
                });
            }

            // ===== CLOSE DROPDOWNS WHEN CLICKING NAV LINKS =====
            var allNavLinks = document.querySelectorAll('.nav-container > a');
            allNavLinks.forEach(function(link) {
                link.addEventListener('click', function() {
                    closeAllDropdowns();
                    if (isMobile()) {
                        navMenu.classList.remove('active');
                    }
                });
            });

            // ===== CLOSE DROPDOWNS WHEN CLICKING DROPDOWN MENU ITEMS =====
            var dropdownLinks = document.querySelectorAll('.dropdown-menu a');
            dropdownLinks.forEach(function(link) {
                link.addEventListener('click', function() {
                    closeAllDropdowns();
                    if (isMobile()) {
                        navMenu.classList.remove('active');
                    }
                });
            });

            // ===== DESKTOP: HOVER BEHAVIOR =====
            dropdowns.forEach(function(drop) {
                var summary = drop.querySelector('summary');

                // HOVER: Open dropdown when mouse enters the entire dropdown (button + menu)
                drop.addEventListener('mouseenter', function() {
                    if (!isMobile()) {
                        // Close all other dropdowns
                        dropdowns.forEach(function(otherDrop) {
                            if (otherDrop !== drop) {
                                otherDrop.removeAttribute('open');
                            }
                        });
                        // Open this dropdown
                        drop.setAttribute('open', '');
                    }
                });

                // HOVER: Close dropdown when mouse leaves the entire dropdown
                drop.addEventListener('mouseleave', function() {
                    if (!isMobile()) {
                        // Small delay to prevent flickering
                        setTimeout(function() {
                            // Check if mouse is still over the dropdown
                            if (!drop.matches(':hover')) {
                                drop.removeAttribute('open');
                            }
                        }, 150);
                    }
                });

                // ===== MOBILE: CLICK TO TOGGLE =====
                if (summary) {
                    summary.addEventListener('click', function(e) {
                        if (isMobile()) {
                            e.preventDefault();
                            e.stopPropagation();
                            
                            // Close all other dropdowns
                            dropdowns.forEach(function(otherDrop) {
                                if (otherDrop !== drop && otherDrop.hasAttribute('open')) {
                                    otherDrop.removeAttribute('open');
                                }
                            });
                            
                            // Toggle this dropdown
                            if (drop.hasAttribute('open')) {
                                drop.removeAttribute('open');
                            } else {
                                drop.setAttribute('open', '');
                            }
                        }
                    });
                }
            });

            // ===== CLOSE DROPDOWNS WHEN CLICKING OUTSIDE =====
            document.addEventListener('click', function(e) {
                var isInsideNav = e.target.closest('.nav-container');
                var isToggle = e.target.closest('.menu-toggle');
                
                if (!isInsideNav && !isToggle) {
                    closeAllDropdowns();
                    
                    if (isMobile() && navMenu.classList.contains('active')) {
                        navMenu.classList.remove('active');
                    }
                }
            });

            // ===== HANDLE WINDOW RESIZE =====
            var resizeTimer;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function() {
                    if (!isMobile() && navMenu.classList.contains('active')) {
                        navMenu.classList.remove('active');
                    }
                    closeAllDropdowns();
                }, 300);
            });
        });
    </script>
</body>
</html>
