<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IJACM - Navbar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ================= OPTIMIZED NAVBAR ================= */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0b2c4d;
            min-height: 100vh;
        }

        .navbar {
            background: linear-gradient(180deg, #0b2b4a, #061d33);
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1000;
            padding: 0 10px;
            width: 100%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav-container {
            max-width: 1400px;
            width: 100%;
            margin: auto;
            display: flex;
            align-items: center;
            gap: 2px;
            justify-content: space-between;
            flex-wrap: nowrap;
        }

        /* Base link styles - Auto-fit based on header */
        .nav-container a, 
        details.dropdown > summary {
            color: #ffffff;
            font-size: clamp(10px, 0.9vw, 14px);
            font-weight: 500;
            padding: 6px clamp(4px, 0.5vw, 10px);
            text-decoration: none;
            transition: all 0.3s ease;
            white-space: nowrap;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            list-style: none;
            letter-spacing: 0.2px;
        }

        /* Remove default details marker */
        details.dropdown > summary::-webkit-details-marker {
            display: none;
        }

        .nav-home {
            font-size: clamp(12px, 1vw, 15px);
            gap: 4px;
            color: #00b0ff;
        }

        .nav-home i {
            font-size: clamp(11px, 0.9vw, 14px);
        }

        .nav-container a:hover,
        details.dropdown > summary:hover {
            color: #00c6ff;
        }

        .nav-container a:active,
        details.dropdown > summary:active {
            color: #00c6ff;
        }

        /* DROPDOWN STYLES */
        details.dropdown {
            position: relative;
            display: inline-block;
        }

        details.dropdown > summary {
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }

        .arrow {
            font-size: 9px;
            transition: transform 0.3s ease;
            margin-left: 1px;
            color: #78909c;
        }

        details.dropdown[open] > summary .arrow {
            transform: rotate(180deg);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            min-width: 200px;
            background: #0b2b4a;
            padding: 6px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
            z-index: 9999;
            margin-top: 4px;
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
        }

        /* Desktop dropdown behavior - FIXED */
        @media (min-width: 1001px) {
            /* Keep dropdown open on hover */
            details.dropdown:hover .dropdown-menu {
                display: flex;
            }
            
            /* Close when not hovered */
            details.dropdown:not(:hover) .dropdown-menu {
                display: none;
            }
            
            /* But if clicked/open, keep it open until clicked again */
            details.dropdown[open] .dropdown-menu {
                display: flex;
            }
            
            /* Override hover close when open */
            details.dropdown[open]:not(:hover) .dropdown-menu {
                display: flex;
            }
        }

        .dropdown-menu a {
            background: #103a63;
            color: #ffffff;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 400;
            border-radius: 5px;
            white-space: nowrap;
            display: block;
            transition: all 0.2s ease;
            border: none;
            text-align: left;
        }

        .dropdown-menu a:hover {
            background: #145a8d;
            transform: translateX(3px);
            color: #ffffff;
        }

        /* MENU TOGGLE */
        .menu-toggle {
            display: none;
            font-size: 20px;
            color: #fff;
            cursor: pointer;
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1001;
            background: none;
            border: none;
        }

        /* ===== RESPONSIVE AUTO-FIT ===== */
        @media (max-width: 1300px) {
            .nav-container a, details.dropdown > summary {
                font-size: clamp(9px, 0.8vw, 12px);
                padding: 6px clamp(2px, 0.4vw, 6px);
            }
            .nav-container { gap: 1px; }
        }

        @media (max-width: 1150px) {
            .nav-container a, details.dropdown > summary {
                font-size: clamp(8px, 0.7vw, 11px);
                padding: 6px clamp(2px, 0.3vw, 4px);
            }
            
            /* Hide less important items on smaller screens */
            .nav-container a[href*="indexing"],
            .nav-container a[href*="publication-fee"] {
                display: none;
            }
        }

        @media (max-width: 1000px) {
            .navbar {
                height: 48px;
                justify-content: space-between;
                padding: 0 12px;
            }

            .menu-toggle {
                display: block;
            }

            .nav-container {
                position: absolute;
                top: 48px;
                left: 0;
                width: 100%;
                background: #061d33;
                flex-direction: column;
                gap: 0;
                padding: 0;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.35s ease-out;
                align-items: flex-start;
                z-index: 1000;
                box-shadow: 0 10px 20px rgba(0,0,0,0.4);
                border-top: 1px solid rgba(255,255,255,0.05);
            }

            .nav-container.active {
                max-height: 100vh;
                overflow-y: auto;
                padding-bottom: 10px;
            }

            .nav-container a, 
            details.dropdown,
            details.dropdown > summary,
            .nav-container a[href*="indexing"],
            .nav-container a[href*="publication-fee"] {
                display: block;
                width: 100%;
                font-size: 14px;
                padding: 10px 20px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.04);
                white-space: normal;
                text-align: left;
                color: #e0e6ed;
            }

            .nav-container a:hover,
            details.dropdown > summary:hover {
                background: rgba(0, 176, 255, 0.08);
            }

            details.dropdown {
                position: static;
            }

            details.dropdown > summary {
                display: flex;
                justify-content: space-between;
                align-items: center;
                width: 100%;
                padding: 10px 20px;
            }

            details.dropdown > summary .arrow {
                font-size: 12px;
            }

            .dropdown-menu {
                position: static;
                width: 100%;
                box-shadow: none;
                background: #041424;
                border-radius: 0;
                padding: 0;
                margin-top: 0;
                display: none !important;
                border: none;
                transform: none;
                min-width: auto;
                backdrop-filter: none;
            }

            details.dropdown[open] .dropdown-menu {
                display: flex !important;
            }

            .dropdown-menu a {
                background: transparent;
                padding: 8px 20px 8px 35px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.03);
                border-radius: 0;
                transform: none;
                font-size: 13px;
                color: #b0bec5;
            }

            .dropdown-menu a:hover {
                background: rgba(0, 176, 255, 0.1);
                transform: none;
                color: #ffffff;
            }

            /* Reset desktop hover for mobile */
            details.dropdown:hover .dropdown-menu {
                display: none !important;
            }
            
            details.dropdown[open] .dropdown-menu {
                display: flex !important;
            }
        }

        @media (min-width: 1400px) {
            .nav-container a, details.dropdown > summary {
                font-size: 15px;
                padding: 6px 12px;
            }
            .nav-container { gap: 4px; }
        }

        @media (max-width: 600px) {
            .navbar {
                height: 44px;
            }
            
            .nav-container {
                top: 44px;
            }
            
            .nav-home span {
                display: none;
            }
            
            .nav-container a, 
            details.dropdown > summary {
                font-size: 13px;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <button class="menu-toggle" aria-label="Toggle menu">
            <i class="fas fa-bars"></i>
        </button>

        <div class="nav-container" id="nav-menu">
            <a href="index.html" class="nav-home">
                <i class="fas fa-home"></i> <span>Home</span>
            </a>

            <a href="pages/about.html">About</a>
            <a href="pages/aims-scope.html">Aims &amp; Scope</a>
            <a href="pages/editorial-board.html">Editorial Board</a>
            <a href="pages/indexing.html">Indexing</a>

            <!-- GUIDELINES DROPDOWN -->
            <details class="dropdown" id="guidelines-dropdown">
                <summary class="dropbtn">
                    Guidelines
                    <span class="arrow">▼</span>
                </summary>
                <div class="dropdown-menu">
                    <a href="pages/author-guidelines.html">Author Guidelines</a>
                    <a href="pages/peer-review.html">Peer Review Policy</a>
                    <a href="pages/reviewer-guidelines.html">Reviewer Guidelines</a>
                    <a href="pages/publication-ethics.html">Publication Ethics</a>
                    <a href="pages/plagiarism-policy.html">Plagiarism Policy</a>
                    <a href="pages/open-access-policy.html">Open Access Policy</a>
                    <a href="pages/copyright.html">Copyright &amp; Licensing</a>
                </div>
            </details>

            <!-- ARTICLES DROPDOWN -->
            <details class="dropdown" id="articles-dropdown">
                <summary class="dropbtn">
                    Articles
                    <span class="arrow">▼</span>
                </summary>
                <div class="dropdown-menu">
                    <a href="pages/current-issue.html">Current Issue</a>
                    <a href="pages/cover-page.html">Cover Page</a>
                    <a href="pages/previous-volume.html">Previous Volumes</a>
                </div>
            </details>

            <a href="pages/publication-fee.html">Fee</a>
            <a href="pages/contact.html">Contact</a>
        </div>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const menuToggle = document.querySelector('.menu-toggle');
            const navMenu = document.getElementById('nav-menu');
            const dropdowns = document.querySelectorAll('details.dropdown');
            let isMobileMenuOpen = false;
            
            function isMobile() {
                return window.innerWidth <= 1000;
            }

            // Mobile menu toggle
            if (menuToggle) {
                menuToggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    navMenu.classList.toggle('active');
                    isMobileMenuOpen = navMenu.classList.contains('active');
                    
                    // Close all dropdowns when closing menu
                    if (!isMobileMenuOpen) {
                        dropdowns.forEach(drop => {
                            drop.removeAttribute('open');
                        });
                    }
                });
            }

            // Handle dropdown toggle on click for all screens
            dropdowns.forEach(drop => {
                const summary = drop.querySelector('summary');
                const menu = drop.querySelector('.dropdown-menu');
                
                if (summary) {
                    summary.addEventListener('click', function(e) {
                        if (isMobile()) {
                            e.preventDefault();
                            e.stopPropagation();
                            
                            // Toggle this dropdown, close others
                            dropdowns.forEach(otherDrop => {
                                if (otherDrop !== drop && otherDrop.hasAttribute('open')) {
                                    otherDrop.removeAttribute('open');
                                }
                            });
                            
                            if (drop.hasAttribute('open')) {
                                drop.removeAttribute('open');
                            } else {
                                drop.setAttribute('open', '');
                            }
                        } else {
                            // Desktop: toggle on click as well (for better UX)
                            // Don't prevent default on desktop
                            // Close other dropdowns on desktop too
                            dropdowns.forEach(otherDrop => {
                                if (otherDrop !== drop && otherDrop.hasAttribute('open')) {
                                    otherDrop.removeAttribute('open');
                                }
                            });
                        }
                    });
                }

                // Prevent closing when clicking inside dropdown menu
                if (menu) {
                    menu.addEventListener('click', function(e) {
                        e.stopPropagation();
                    });

                    // Close dropdown when clicking a link inside
                    menu.querySelectorAll('a').forEach(link => {
                        link.addEventListener('click', function() {
                            if (isMobile()) {
                                drop.removeAttribute('open');
                                navMenu.classList.remove('active');
                                isMobileMenuOpen = false;
                            } else {
                                // On desktop, close dropdown after clicking link
                                setTimeout(() => {
                                    drop.removeAttribute('open');
                                }, 200);
                            }
                        });
                    });
                }
            });

            // Close menu when clicking outside on mobile
            document.addEventListener('click', function(e) {
                if (isMobile() && navMenu.classList.contains('active')) {
                    const isClickInside = e.target.closest('.nav-container') || e.target.closest('.menu-toggle');
                    if (!isClickInside) {
                        navMenu.classList.remove('active');
                        isMobileMenuOpen = false;
                        dropdowns.forEach(drop => {
                            drop.removeAttribute('open');
                        });
                    }
                }
            });

            // Handle window resize
            let resizeTimer;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function() {
                    if (!isMobile() && navMenu.classList.contains('active')) {
                        navMenu.classList.remove('active');
                        isMobileMenuOpen = false;
                    }
                    dropdowns.forEach(drop => {
                        drop.removeAttribute('open');
                    });
                }, 300);
            });
        });
    </script>
</body>
</html>
