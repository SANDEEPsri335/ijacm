<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IJACM - Navbar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ================= OPTIMIZED NAVBAR ================= */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0b2c4d;
            min-height: 100vh;
        }

        .navbar {
            background: linear-gradient(180deg, #0b2b4a, #061d33);
            height: 56px;
            /* Reduced from 72px */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1000;
            padding: 0 15px;
            width: 100%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .nav-container {
            max-width: 1400px;
            width: 100%;
            margin: auto;
            display: flex;
            align-items: center;
            gap: clamp(6px, 1vw, 16px);
            justify-content: center;
            flex-wrap: nowrap;
        }

        /* Base link styles */
        .nav-container a, 
        details.dropdown > summary {
            color: #ffffff;
            font-size: clamp(12px, 1vw, 14px);
            /* Reduced font size */
            font-weight: 500;
            padding: 8px clamp(3px, 0.6vw, 10px);
            /* Reduced padding */
            text-decoration: none;
            transition: all 0.3s ease;
            white-space: nowrap;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            list-style: none;
        }

        /* Remove default details marker */
        details.dropdown > summary::-webkit-details-marker {
            display: none;
        }

        .nav-home {
            font-size: clamp(13px, 1.1vw, 16px);
            gap: 4px;
        }

        .nav-container a:hover,
        details.dropdown > summary:hover {
            color: #00c6ff;
        }

        /* DROPDOWN STYLES */
        details.dropdown {
            position: relative;
            display: inline-block;
        }

        details.dropdown > summary {
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        .arrow {
            font-size: 11px;
            transition: transform 0.3s ease;
            margin-left: 2px;
        }

        details.dropdown[open] > summary .arrow {
            transform: rotate(180deg);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            min-width: 220px;
            background: #0b2b4a;
            padding: 8px;
            /* Reduced padding */
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
            z-index: 9999;
            margin-top: 6px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        /* Desktop hover behavior - FIXED */
        @media (min-width: 1001px) {
            details.dropdown {
                display: inline-block;
            }
            
            details.dropdown > summary {
                cursor: pointer;
            }
            
            /* Keep dropdown open when hovering over it */
            details.dropdown:hover {
                display: inline-block;
            }
            
            details.dropdown:hover > summary {
                color: #00c6ff;
            }
            
            details.dropdown:hover .dropdown-menu {
                display: flex;
            }
            
            /* If not hovered, hide */
            details.dropdown:not(:hover) .dropdown-menu {
                display: none;
            }
            
            /* When open via click, keep it open until clicked again */
            details.dropdown[open] .dropdown-menu {
                display: flex;
            }
            
            details.dropdown[open]:not(:hover) .dropdown-menu {
                display: flex;
            }
        }

        .dropdown-menu a {
            background: #103a63;
            color: #ffffff;
            padding: 10px 14px;
            /* Reduced padding */
            font-size: 13px;
            font-weight: 500;
            border-radius: 6px;
            white-space: nowrap;
            display: block;
            transition: all 0.25s ease;
            border: none;
        }

        .dropdown-menu a:hover {
            background: #145a8d;
            transform: translateX(3px);
            color: #ffffff;
        }

        /* MENU TOGGLE */
        .menu-toggle {
            display: none;
            font-size: 22px;
            color: #fff;
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1001;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1300px) {
            .nav-container a, details.dropdown > summary {
                font-size: 12px;
                padding: 8px 3px;
            }
            .nav-container { gap: 8px; }
        }

        @media (max-width: 1150px) {
            .nav-container a, details.dropdown > summary {
                font-size: 11px;
                padding: 8px 2px;
            }
            .nav-container { gap: 5px; }
            
            .nav-container a[href*="indexing"],
            .nav-container a[href*="publication-fee"] {
                display: none;
            }
        }

        @media (max-width: 1000px) {
            .navbar {
                height: 50px;
                /* Even smaller on mobile */
                justify-content: space-between;
            }

            .menu-toggle {
                display: block;
            }

            .nav-container {
                position: absolute;
                top: 50px;
                left: 0;
                width: 100%;
                background: #061d33;
                flex-direction: column;
                gap: 0;
                padding: 0;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.4s ease-out;
                align-items: flex-start;
                z-index: 1000;
                box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            }

            .nav-container.active {
                max-height: 100vh;
                overflow-y: auto;
                padding-bottom: 15px;
            }

            .nav-container a, 
            details.dropdown,
            details.dropdown > summary,
            .nav-container a[href*="indexing"],
            .nav-container a[href*="publication-fee"] {
                display: block;
                width: 100%;
                font-size: 15px;
                padding: 12px 20px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                white-space: normal;
                text-align: left;
            }

            details.dropdown {
                position: static;
            }

            details.dropdown > summary {
                display: flex;
                justify-content: space-between;
                align-items: center;
                width: 100%;
            }

            .dropdown-menu {
                position: static;
                width: 100%;
                box-shadow: none;
                background: #041424;
                border-radius: 0;
                padding: 0;
                margin-top: 0;
                display: none !important;
                border: none;
            }

            details.dropdown[open] .dropdown-menu {
                display: flex !important;
            }

            .dropdown-menu a {
                background: transparent;
                padding: 10px 20px 10px 35px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.03);
                border-radius: 0;
                transform: none;
                font-size: 14px;
            }

            .dropdown-menu a:hover {
                background: #103a63;
                transform: none;
            }

            details.dropdown:hover .dropdown-menu {
                display: none !important;
            }
            
            details.dropdown[open] .dropdown-menu {
                display: flex !important;
            }
        }

        @media (min-width: 1400px) {
            .nav-container a, details.dropdown > summary {
                font-size: 15px;
                padding: 8px 10px;
            }
        }

        @media (max-width: 600px) {
            .nav-home span {
                display: none;
            }
            
            .navbar {
                height: 46px;
            }
            
            .nav-container a, 
            details.dropdown > summary {
                font-size: 14px;
                padding: 10px 16px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="menu-toggle">
            <i class="fas fa-bars"></i>
        </div>

        <div class="nav-container" id="nav-menu">
            <a href="index.html" class="nav-home">
                <i class="fas fa-home"></i> <span>Home</span>
            </a>

            <a href="pages/about.html">About</a>
            <a href="pages/aims-scope.html">Aims & Scope</a>
            <a href="pages/editorial-board.html">Editorial Board</a>
            <a href="pages/indexing.html">Indexing</a>

            <!-- GUIDELINES DROPDOWN -->
            <details class="dropdown" id="guidelines-dropdown">
                <summary class="dropbtn">
                    Guidelines
                    <span class="arrow">▼</span>
                </summary>
                <div class="dropdown-menu">
                    <a href="pages/author-guidelines.html">Author Guidelines</a>
                    <a href="pages/peer-review.html">Peer Review Policy</a>
                    <a href="pages/reviewer-guidelines.html">Reviewer Guidelines</a>
                    <a href="pages/publication-ethics.html">Publication Ethics</a>
                    <a href="pages/plagiarism-policy.html">Plagiarism Policy</a>
                    <a href="pages/open-access-policy.html">Open Access Policy</a>
                    <a href="pages/copyright.html">Copyright & Licensing</a>
                </div>
            </details>

            <!-- ARTICLES DROPDOWN -->
            <details class="dropdown" id="articles-dropdown">
                <summary class="dropbtn">
                    Articles
                    <span class="arrow">▼</span>
                </summary>
                <div class="dropdown-menu">
                    <a href="pages/current-issue.html">Current Issue</a>
                    <a href="pages/previous-volume.html">Previous Volumes</a>
                </div>
            </details>

            <a href="pages/publication-fee.html">Fee</a>
            <a href="pages/contact.html">Contact</a>
        </div>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const menuToggle = document.querySelector('.menu-toggle');
            const navMenu = document.getElementById('nav-menu');
            const dropdowns = document.querySelectorAll('details.dropdown');
            
            function isMobile() {
                return window.innerWidth <= 1000;
            }

            // Mobile menu toggle
            if (menuToggle) {
                menuToggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    navMenu.classList.toggle('active');
                    
                    if (!navMenu.classList.contains('active')) {
                        dropdowns.forEach(drop => {
                            drop.removeAttribute('open');
                        });
                    }
                });
            }

            // Close mobile menu when clicking a link (not dropdown items)
            const navLinks = document.querySelectorAll('.nav-container > a:not(.dropbtn)');
            navLinks.forEach(link => {
                link.addEventListener('click', function() {
                    if (isMobile()) {
                        navMenu.classList.remove('active');
                    }
                });
            });

            // Handle dropdown toggle on mobile - prevent closing when clicking inside
            dropdowns.forEach(drop => {
                const summary = drop.querySelector('summary');
                const menu = drop.querySelector('.dropdown-menu');
                
                if (summary) {
                    summary.addEventListener('click', function(e) {
                        if (isMobile()) {
                            e.preventDefault();
                            // Toggle this dropdown, close others
                            dropdowns.forEach(otherDrop => {
                                if (otherDrop !== drop && otherDrop.hasAttribute('open')) {
                                    otherDrop.removeAttribute('open');
                                }
                            });
                            
                            if (drop.hasAttribute('open')) {
                                drop.removeAttribute('open');
                            } else {
                                drop.setAttribute('open', '');
                            }
                        }
                    });
                }

                // Prevent closing when clicking inside dropdown menu on mobile
                if (menu) {
                    menu.addEventListener('click', function(e) {
                        if (isMobile()) {
                            e.stopPropagation();
                        }
                    });

                    // Close dropdown and mobile menu when clicking a link inside
                    menu.querySelectorAll('a').forEach(link => {
                        link.addEventListener('click', function() {
                            if (isMobile()) {
                                drop.removeAttribute('open');
                                navMenu.classList.remove('active');
                            }
                        });
                    });
                }
            });

            // Close menu when clicking outside
            document.addEventListener('click', function(e) {
                if (isMobile() && navMenu.classList.contains('active')) {
                    const isClickInside = e.target.closest('.nav-container') || e.target.closest('.menu-toggle');
                    if (!isClickInside) {
                        navMenu.classList.remove('active');
                        dropdowns.forEach(drop => {
                            drop.removeAttribute('open');
                        });
                    }
                }
            });

            // Handle window resize
            let resizeTimer;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function() {
                    if (!isMobile() && navMenu.classList.contains('active')) {
                        navMenu.classList.remove('active');
                    }
                    dropdowns.forEach(drop => {
                        drop.removeAttribute('open');
                    });
                }, 250);
            });
        });
    </script>
</body>
</html>
