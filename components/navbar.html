<style>
    /* ================= OPTIMIZED NAVBAR WITH AUTO-FONT ================= */

    .navbar {
        background: linear-gradient(180deg, #0b2b4a, #061d33);
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 1000;
        padding: 0 20px;
        width: 100%;
    }

    .nav-container {
        max-width: 1400px; /* Increased from 1200px */
        width: 100%;
        margin: auto;
        display: flex;
        align-items: center;
        gap: clamp(8px, 1.5vw, 20px); /* Responsive gap */
        justify-content: center;
        flex-wrap: nowrap;
    }

    /* DYNAMIC FONT SIZING */
    .nav-container a, 
    .dropdown > summary {
        color: #ffffff;
        font-size: clamp(13px, 1.2vw, 16px); /* Auto-adjusts between 13-16px */
        font-weight: 500;
        padding: 12px clamp(4px, 0.8vw, 8px); /* Responsive padding */
        text-decoration: none;
        transition: color 0.3s ease;
        white-space: nowrap;
    }

    /* HOME ICON */
    .nav-home {
        font-size: clamp(14px, 1.3vw, 18px);
    }

    /* DROPDOWN WRAPPER */
    .dropdown {
        position: relative;
    }

    details.dropdown {
        position: relative;
        display: inline-flex;
        align-items: center;
        margin: 0;
        padding: 0;
    }

    details.dropdown > summary {
        list-style: none;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
    }

    details.dropdown > summary::-webkit-details-marker {
        display: none;
    }

    details.dropdown > summary::after {
        content: '▾';
        font-size: 0.9em;
        margin-left: 4px;
        opacity: 0.8;
    }

    .nav-container a:hover,
    details.dropdown > summary:hover {
        color: #00c6ff;
    }

    /* DROPDOWN PANEL */
    .dropdown-menu {
        position: absolute;
        top: 100%;
        left: 0;
        min-width: 280px;
        background: #0b2b4a;
        padding: 12px;
        border-radius: 12px;
        display: none;
        flex-direction: column;
        gap: 8px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.4);
        z-index: 9999;
        margin-top: 8px;
    }

    /* Show dropdown on hover for desktop */
    @media (min-width: 1001px) {
        .dropdown:hover .dropdown-menu,
        details.dropdown[open] .dropdown-menu {
            display: flex;
        }
    }

    .dropdown-menu a {
        background: #103a63;
        color: #ffffff;
        padding: 12px 16px;
        font-size: 14px;
        font-weight: 500;
        border-radius: 8px;
        white-space: nowrap;
    }

    .dropdown-menu a:hover {
        background: #145a8d;
        transform: translateX(4px);
    }

    /* MENU TOGGLE */
    .menu-toggle {
        display: none;
        font-size: 24px;
        color: #fff;
        cursor: pointer;
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
    }

    /* MEDIA QUERIES - Progressive adjustment */
    @media (max-width: 1300px) {
        .nav-container a, 
        .dropdown > summary {
            font-size: 14px;
            padding: 12px 4px;
        }
        
        .nav-container {
            gap: 12px;
        }
    }

    @media (max-width: 1150px) {
        .nav-container a, 
        .dropdown > summary {
            font-size: 13px;
            padding: 12px 3px;
        }
        
        .nav-container {
            gap: 8px;
        }
        
        /* Hide less important items if needed */
        .nav-container a[href*="indexing"],
        .nav-container a[href*="publication-fee"] {
            display: none; /* Hides on smaller screens */
        }
    }

    @media (max-width: 1000px) {
        .navbar {
            justify-content: space-between;
        }

        .menu-toggle {
            display: block;
        }

        .nav-container {
            position: absolute;
            top: 72px;
            left: 0;
            width: 100%;
            background: #061d33;
            flex-direction: column;
            gap: 0;
            padding: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            align-items: flex-start;
            z-index: 1000;
        }

        .nav-container.active {
            max-height: 100vh;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        /* Reset mobile styles */
        .nav-container a, 
        .dropdown > summary,
        .nav-container a[href*="indexing"],
        .nav-container a[href*="publication-fee"] {
            display: block;
            width: 100%;
            font-size: 16px;
            padding: 15px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            white-space: normal;
        }

        .dropdown {
            width: 100%;
        }

        details.dropdown > summary {
            width: 100%;
            justify-content: space-between;
        }

        details.dropdown > summary::after {
            content: '▾';
        }

        .dropdown-menu {
            position: static;
            width: 100%;
            box-shadow: none;
            background: #041424;
            border-radius: 0;
            padding: 0;
            margin-top: 0;
        }

        .dropdown-menu a {
            background: transparent;
            padding-left: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transform: none;
        }

        .dropdown-menu a:hover {
            background: #103a63;
            transform: none;
        }
    }

    /* For very large screens, show all items */
    @media (min-width: 1400px) {
        .nav-container a, 
        .dropdown > summary {
            font-size: 16px;
            padding: 12px 10px;
        }
    }
</style>

<script>
    // Mobile menu toggle
    document.addEventListener('DOMContentLoaded', function() {
        const menuToggle = document.querySelector('.menu-toggle');
        const navMenu = document.getElementById('nav-menu');
        
        if (menuToggle) {
            menuToggle.addEventListener('click', function() {
                navMenu.classList.toggle('active');
            });
        }

        // Handle dropdowns on mobile
        if (window.innerWidth <= 1000) {
            const dropdowns = document.querySelectorAll('details.dropdown');
            dropdowns.forEach(dropdown => {
                dropdown.addEventListener('toggle', function(e) {
                    e.stopPropagation();
                });
            });
        }
    });
</script>
